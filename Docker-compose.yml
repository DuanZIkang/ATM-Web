services:
  atm-backend:
    image: atm
    container_name: atm
    ports:
      - "8090:8090"
    environment:
      - ATM_AES_KEY = ${ATM_AES_KEY}
    restart: always
    networks:
      - atm-network
  nginx:
    image: nginx:1.30.2
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/nginx.conf:/etc/nginx/nginx.conf
      - /etc/nginx/ssl:/etc/nginx/ssl
      - html:/usr/share/nginx/html
    restart: always
    networks:
      - atm-network
networks:
  atm-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.17.0.0/16
volumes:
  html:
    external: true
